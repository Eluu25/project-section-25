# Render Blueprint — monorepo: API lives in /backend
# Use rootDir (not "path") — see https://render.com/docs/blueprint-spec

services:
  - type: web
    name: edekise-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_CLIENT
        value: postgres
      - key: PG_SSL
        value: "true"
      - key: SEED_DEFAULT_USERS
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: edekise-db
          property: connectionString
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: Edekise Microfinance

databases:
  - name: edekise-db
    plan: free
    databaseName: edekise_microfinance
    user: edekise
